spring.application.name=cashfree-pg-java-demo
spring.config.import=optional:file:./config/cashfree-demo.properties
debug=false
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
logging.level.root=INFO

cashfree.client-id=${CASHFREE_CLIENT_ID:}
cashfree.client-secret=${CASHFREE_CLIENT_SECRET:}
cashfree.environment=${CASHFREE_ENVIRONMENT:SANDBOX}
cashfree.sdk-version=5.0.1
cashfree.sdk-type=Java Backend SDK
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
